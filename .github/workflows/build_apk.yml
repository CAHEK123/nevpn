name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # v17 — master p4a + NDK r23b + kivy 2.3.0
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-v17-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v17-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache lld libltdl-dev \
            build-essential

      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade pip
          pip3 install Cython==0.29.37
          pip3 install buildozer==1.5.0

      - name: Set HOSTPYTHON to Python 3.11          # <-- НОВЫЙ ШАГ
        run: |
          PYTHON311_PATH=$(which python3.11)
          echo "HOSTPYTHON=$PYTHON311_PATH" >> $GITHUB_ENV
          echo "Using HOSTPYTHON=$PYTHON311_PATH"

      - name: Verify files
        run: |
          echo "=== buildozer.spec ===" && cat buildozer.spec
          echo "=== images/ ===" && ls images/ 2>/dev/null || echo "WARN: папки images/ нет"

      - name: Build debug APK
        run: |
          buildozer android debug -v 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          HOSTPYTHON: ${{ env.HOSTPYTHON }}            # <-- ДОБАВЛЕНО

      - name: Find APK
        if: always()
        run: |
          echo "=== Ищем APK ==="
          find . -name "*.apk" 2>/dev/null || echo "APK не найден"
          echo "=== Содержимое bin/ ==="
          ls -la bin/ 2>/dev/null || echo "папки bin/ нет"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nevpn-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
