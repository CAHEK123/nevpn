name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.9'

      - name: Wipe stale Buildozer cache
        run: rm -rf ~/.buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-v400-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v400-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache lld libltdl-dev \
            build-essential

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.37
          # Ставим buildozer С зависимостями — он подтянет p4a v2024.01.21 с PyPI
          # Это последний официальный релиз где hostpython3 дефолтно = 3.11.9
          pip install buildozer==1.5.0

      - name: Verify p4a version
        run: python -c "import pythonforandroid; print(pythonforandroid.__version__)"

      - name: Patch hostpython3 default version to 3.11.9
        run: |
          # Находим файл рецепта hostpython3 и смотрим текущий дефолт
          HP3=$(python -c "import pythonforandroid; import os; print(os.path.dirname(pythonforandroid.__file__))")/recipes/hostpython3/__init__.py
          echo "=== Before patch ==="
          grep -n "version\s*=" "$HP3" | head -5
          # Патчим дефолтную версию если она не 3.11.9
          sed -i "s/version = '[0-9]\+\.[0-9]\+\.[0-9]\+'/version = '3.11.9'/" "$HP3"
          echo "=== After patch ==="
          grep -n "version\s*=" "$HP3" | head -5

      - name: Patch python3 default version to 3.11.9
        run: |
          PY3=$(python -c "import pythonforandroid; import os; print(os.path.dirname(pythonforandroid.__file__))")/recipes/python3/__init__.py
          echo "=== Before patch ==="
          grep -n "version\s*=" "$PY3" | head -5
          sed -i "s/version = '[0-9]\+\.[0-9]\+\.[0-9]\+'/version = '3.11.9'/" "$PY3"
          echo "=== After patch ==="
          grep -n "version\s*=" "$PY3" | head -5

      - name: Prepare assets (images/ folder)
        run: |
          mkdir -p images
          for f in flag_de.png flag_jp.png flag_nl.png flag_us.png logo_icon.png; do
            [ -f "$f" ] && cp "$f" images/ || true
          done
          echo "=== images/ ===" && ls images/

      - name: Build debug APK
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "APK не найден"
          ls -la bin/ 2>/dev/null || echo "папки bin/ нет"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nevpn-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
