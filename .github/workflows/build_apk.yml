name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # v7 — kivy==2.3.0 (стабильная) + сброс кэша
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v8-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v8-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache lld libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.37

      - name: Build debug APK
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Find APK location
        if: always()
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== bin/ contents ==="
          ls -lh bin/ 2>/dev/null || echo "No bin/ directory"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nevpn-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
