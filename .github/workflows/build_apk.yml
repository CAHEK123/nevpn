name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v7-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-v7-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache lld libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.37

      - name: First build pass (downloads/installs everything)
        run: |
          buildozer android debug 2>&1 | tee build.log || true
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Patch KivyMD material_resources.py
        run: |
          PATCH_FILE=$(find ~/.buildozer -name "material_resources.py" -path "*/kivymd/*" 2>/dev/null | head -1)
          if [ -n "$PATCH_FILE" ]; then
            echo "Patching: $PATCH_FILE"
            python3 - "$PATCH_FILE" << 'PYEOF'
          import sys, re
          path = sys.argv[1]
          with open(path, 'r') as f:
              code = f.read()
          # Replace Window.width usage with safe fallback
          code = re.sub(
              r'dp\(Window\.width\)',
              'dp(360)',
              code
          )
          code = re.sub(
              r'Window\.width',
              '(360)',
              code
          )
          with open(path, 'w') as f:
              f.write(code)
          print("Patched successfully")
          PYEOF
          else
            echo "material_resources.py not found yet (first build pass needed)"
          fi

      - name: Final build with patched KivyMD
        run: |
          buildozer android debug 2>&1 | tee -a build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nevpn-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
